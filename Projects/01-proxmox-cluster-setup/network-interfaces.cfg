# Proxmox VE Network Configuration Artifact
# Node: pve-node1

auto lo
iface lo inet loopback

iface nic0 inet manual

iface wlp0s20f3 inet manual

auto vmbr0
iface vmbr0 inet static
        address 10.10.10.11/24
        gateway 10.10.10.1
        bridge-ports nic0
        bridge-stp off
        bridge-fd 0

auto vmbr
iface vmbr inet manual